name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Tests (Python 3.11)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage
      # Tests use SQLite in-memory — no MySQL service required.
      # All required env vars are set in conftest.py via os.environ.setdefault().
      env:
        SECRET_KEY: test-secret-key-that-is-long-enough-for-testing-1234
        ALGORITHM: HS256
        ACCESS_TOKEN_EXPIRE_MINUTES: 30
        ALLOWED_ORIGINS: "http://localhost:3000"
        DB_HOST: localhost
        DB_USER: root
        DB_PASSWORD: root
        DB_NAME: test_db
      run: |
        pytest tests/ \
          --cov=app \
          --cov-report=term-missing \
          --cov-report=xml \
          -v

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.xml

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: |
        # Build the image (entrypoint will fail on migration — that's expected in CI without DB)
        # We just verify the image builds successfully.
        docker build -t learnarc-api:ci .

    - name: Verify image was created
      run: docker image inspect learnarc-api:ci
