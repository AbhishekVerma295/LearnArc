# alembic.ini — Alembic Configuration File
# ==========================================
# This file configures Alembic, the database migration tool for SQLAlchemy.
#
# What is a migration?
# When you change a SQLAlchemy model (add a column, rename a table, etc.),
# Alembic generates a Python migration script. Running that script updates
# the real database to match your models. This is much safer than running
# raw ALTER TABLE statements by hand.
#
# The sqlalchemy.url below is a PLACEHOLDER. The real URL is set
# dynamically in alembic/env.py using our app's Settings class.
# This keeps credentials out of version control.

[alembic]
# Where the migration scripts are stored.
script_location = alembic

# Add the project root to sys.path so `from app.xxx import yyy` works
# when Alembic runs env.py.
prepend_sys_path = .

# Separator used in version file names (os = system separator).
version_path_separator = os

# Placeholder — overridden in env.py via settings.database_url
sqlalchemy.url = mysql+pymysql://user:pass@localhost/course_platform


# ── Logging Configuration ─────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
